name: Fetch Puppeteer v2 (Chrome Headless)

on:
  repository_dispatch:
    types: [fetch-puppeteer-v2]

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Chrome
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq google-chrome-stable 2>/dev/null || true
      - name: Fetch with Chrome Headless
        run: |
          mkdir -p fetched
          NAME="${{ github.event.client_payload.name }}"
          URL="${{ github.event.client_payload.url }}"
          google-chrome-stable --headless --disable-gpu --dump-dom --no-sandbox "$URL" > "fetched/$NAME"
      - name: Commit
        run: |
          git config user.name "Souluozi Bridge"
          git config user.email "souluozi@bridge"
          git add fetched/
          git diff --cached --quiet || git commit -m "fetch: $NAME"
          git push
